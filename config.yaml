bluefors:
  base_url: ""
  snapshot_branch: ""
  snapshot_fields: "name;value;status"
  verify_ssl: false

operating_phases:
  temperature_paths:
    t50k: mapper.bf.temperatures.t50k
    t4k: mapper.bf.temperatures.t4k
    tstill: mapper.bf.temperatures.tstill
    tmixing: mapper.bf.temperatures.tmixing
  warmup:
    auto_start_enabled: true
    auto_start_t50k_k: 100.0
    auto_start_sustain_polls: 3
    heater_4k:
      enabled: true
      value_path: mapper.bf.heaters.heater
      on_values: ["1"]
  cryo_normal:
    tmixing_max_k: 0.1
    sustain_polls: 3

logging:
  level: INFO
  app_log_path: logs/app.log
  audit_log_path: logs/audit.jsonl
  audit_rotate_mb: 10
  audit_rotate_backups: 50
  log_metric_evaluations: false

slack:
  mention_channel_on_critical: false
  default_reminder_interval_seconds: 900
  status_fields_per_section: 10
  default_system_name: "Bluefors XLD1000"

metrics:
  - id: mxc_temperature
    name: "MXC 溫度"
    value_path: "mapper.bf.temperatures.tmixing"
    category: temperature
    unit: "K"
    value_type: float
    playbook: "檢查 MXC 加熱器與 dilution 狀態"
    rules:
      - severity: warning
        condition: above
        threshold: 0.1
        sustain_polls: 3
      - severity: critical
        condition: above
        threshold: 1.0
        sustain_polls: 1
    recovery:
      hysteresis: 0.05
    cooldown_seconds: 300
    # reminder_interval_seconds: 600

  - id: t50k_temperature
    name: "50K 溫度"
    value_path: "mapper.bf.temperatures.t50k"
    category: temperature
    unit: "K"
    value_type: float
    playbook: "檢查 50K 段與預冷系統"
    rules: []
    cooldown_seconds: 300

  - id: t4k_temperature
    name: "4K 溫度"
    value_path: "mapper.bf.temperatures.t4k"
    category: temperature
    unit: "K"
    value_type: float
    playbook: "檢查 4K 段"
    rules: []
    cooldown_seconds: 300

  - id: tstill_temperature
    name: "Still 溫度"
    value_path: "mapper.bf.temperatures.tstill"
    category: temperature
    unit: "K"
    value_type: float
    playbook: "檢查 still 加熱器"
    rules: []
    cooldown_seconds: 300

  - id: magnet_enabled
    name: "磁鐵感測器啟用"
    value_path: "mapper.bf.temperatures.tmagnet_enabled"
    category: sensor_connection
    value_type: int
    optional: true
    playbook: "確認磁鐵感測器是否已啟用"
    rules: []
    cooldown_seconds: 300

  - id: magnet_temperature
    name: "磁鐵溫度"
    value_path: "mapper.bf.temperatures.tmagnet"
    category: temperature
    unit: "K"
    value_type: float
    optional: true
    enabled_by_metric: magnet_enabled
    enabled_by_value: "1"
    playbook: "檢查磁鐵溫度與冷卻狀態"
    rules:
      - severity: warning
        condition: above
        threshold: 6.0
        sustain_polls: 3
      - severity: critical
        condition: above
        threshold: 6.5
        sustain_polls: 1
    recovery:
      hysteresis: 0.2
    cooldown_seconds: 300
    # reminder_interval_seconds: 600

  - id: compressor_1_inlet_water
    name: "壓縮機 1 冷卻水入水溫"
    value_path: "mapper.bflegacy.double.cpatempwi"
    category: compressor
    unit: "°C"
    value_type: float
    playbook: "檢查冷卻水循環與熱交換器"
    rules:
      - severity: warning
        condition: above
        threshold: 22.0
        sustain_polls: 2
      - severity: critical
        condition: above
        threshold: 25.0
        sustain_polls: 1
    recovery:
      hysteresis: 2.0
    cooldown_seconds: 300

  - id: compressor_1_error
    name: "壓縮機 1 錯誤碼"
    value_path: "mapper.bflegacy.double.cpaerr"
    category: compressor
    value_type: int
    playbook: "查閱壓縮機 1 手冊錯誤碼表"
    rules:
      - severity: critical
        condition: above
        threshold: 0
        sustain_polls: 1
    cooldown_seconds: 600

  - id: compressor_2_inlet_water
    name: "壓縮機 2 冷卻水入水溫"
    value_path: "mapper.bflegacy.double.cpatempwi_2"
    category: compressor
    unit: "°C"
    value_type: float
    playbook: "檢查壓縮機 2 冷卻水循環"
    rules:
      - severity: warning
        condition: above
        threshold: 22.0
        sustain_polls: 2
      - severity: critical
        condition: above
        threshold: 25.0
        sustain_polls: 1
    recovery:
      hysteresis: 2.0
    cooldown_seconds: 300

  - id: compressor_2_error
    name: "壓縮機 2 錯誤碼"
    value_path: "mapper.bflegacy.double.cpaerr_2"
    category: compressor
    value_type: int
    playbook: "查閱壓縮機 2 手冊錯誤碼表"
    rules:
      - severity: critical
        condition: above
        threshold: 0
        sustain_polls: 1
    cooldown_seconds: 600

  - id: turbo_1_status
    name: "Turbo 1"
    value_path: "mapper.bf.pumps.turbo1"
    category: turbo
    value_type: enum
    enum_values:
      error: ["2"]
      running: ["1"]
      "off": ["0"]
    playbook: "檢查 Turbo 1 狀態與真空系統"
    rules:
      - severity: critical
        condition: equals
        threshold: error
        sustain_polls: 1
    cooldown_seconds: 300

  - id: turbo_2_status
    name: "Turbo 2"
    value_path: "mapper.bf.pumps.turbo2"
    category: turbo
    value_type: enum
    enum_values:
      error: ["2"]
      running: ["1"]
      "off": ["0"]
    playbook: "檢查 Turbo 2 狀態與真空系統"
    rules:
      - severity: critical
        condition: equals
        threshold: error
        sustain_polls: 1
    cooldown_seconds: 300

  - id: pressure_p1
    name: "壓力 P1"
    value_path: "mapper.bf.pressures.p1"
    category: pressure
    unit: "bar"
    value_type: float
    rules: []
    cooldown_seconds: 300

  - id: pressure_p2
    name: "壓力 P2"
    value_path: "mapper.bf.pressures.p2"
    category: pressure
    unit: "bar"
    value_type: float
    rules: []
    cooldown_seconds: 300

  - id: pressure_p3
    name: "壓力 P3"
    value_path: "mapper.bf.pressures.p3"
    category: pressure
    unit: "bar"
    value_type: float
    rules: []
    cooldown_seconds: 300

  - id: pressure_p4
    name: "壓力 P4"
    value_path: "mapper.bf.pressures.p4"
    category: pressure
    unit: "bar"
    value_type: float
    rules: []
    cooldown_seconds: 300

  - id: pressure_p5
    name: "壓力 P5"
    value_path: "mapper.bf.pressures.p5"
    category: pressure
    unit: "bar"
    value_type: float
    rules: []
    cooldown_seconds: 300

  - id: pressure_p6
    name: "壓力 P6"
    value_path: "mapper.bf.pressures.p6"
    category: pressure
    unit: "bar"
    value_type: float
    rules: []
    cooldown_seconds: 300

  - id: flow_rate
    name: "流量"
    value_path: "mapper.bf.flow"
    category: flow
    unit: ""
    value_type: float
    playbook: "檢查 flowmeter 與管路"
    rules:
      - severity: warning
        condition: below
        threshold: 0.5
        sustain_polls: 3
    cooldown_seconds: 300

  - id: sensor_connection_mxc
    name: "MXC 感測器連線狀態"
    value_path: "mapper.bf.temperatures.tmixing"
    category: sensor_connection
    value_type: sample_status
    playbook: "檢查 BFTC 連線與感測器線路"
    rules:
      - severity: critical
        condition: status_not_in
        threshold: ["SYNCHRONIZED", "CHANGED", "INDEPENDENT", "QUEUED"]
        sustain_polls: 2
    cooldown_seconds: 300

  - id: sensor_connection_t4k
    name: "4K 感測器連線狀態"
    value_path: "mapper.bf.temperatures.t4k"
    category: sensor_connection
    value_type: sample_status
    playbook: "檢查 4K 感測器連線"
    rules:
      - severity: critical
        condition: status_not_in
        threshold: ["SYNCHRONIZED", "CHANGED", "INDEPENDENT", "QUEUED"]
        sustain_polls: 2
    cooldown_seconds: 300

  - id: sensor_connection_tstill
    name: "Still 感測器連線狀態"
    value_path: "mapper.bf.temperatures.tstill"
    category: sensor_connection
    value_type: sample_status
    playbook: "檢查 still 感測器連線"
    rules:
      - severity: critical
        condition: status_not_in
        threshold: ["SYNCHRONIZED", "CHANGED", "INDEPENDENT", "QUEUED"]
        sustain_polls: 2
    cooldown_seconds: 300
